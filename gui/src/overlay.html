<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recording Overlay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 300px;
      height: 100px;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #waveform {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 20px;
    }
    .bar {
      width: 8px;
      background: linear-gradient(to top, #3b82f6, #8b5cf6);
      border-radius: 4px;
      transition: height 0.05s ease;
    }
    .recording-indicator {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 12px;
      height: 12px;
      background: #ef4444;
      border-radius: 50%;
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
  </style>
</head>
<body>
  <div class="recording-indicator"></div>
  <div id="waveform"></div>
  <script>
    const waveform = document.getElementById('waveform');
    const barCount = 20;
    const bars = [];

    // 创建声纹条
    for (let i = 0; i < barCount; i++) {
      const bar = document.createElement('div');
      bar.className = 'bar';
      bar.style.height = '10px';
      waveform.appendChild(bar);
      bars.push(bar);
    }

    // 监听音频振幅事件
    if (window.__TAURI__) {
      const { listen } = window.__TAURI__.event;
      listen('audio-amplitude', (event) => {
        const amplitude = event.payload || 0;
        bars.forEach((bar, i) => {
          const randomFactor = 0.5 + Math.random() * 0.5;
          const height = Math.max(10, amplitude * 60 * randomFactor);
          bar.style.height = `${height}px`;
        });
      });
    }

    // 模拟动画（如果没有收到事件）
    setInterval(() => {
      bars.forEach(bar => {
        const height = Math.max(10, Math.random() * 40);
        bar.style.height = `${height}px`;
      });
    }, 100);
  </script>
</body>
</html>
